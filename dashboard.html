<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Op-Ed Reliability Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #ffffff; --bg2: #f5f4f0; --bg3: #edecea;
    --text:     #1a1a1a; --text2: #555; --text3: #888;
    --border:   rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.2);
    --blue:     #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green:    #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
    --red:      #A32D2D;  --red-bg: #FCEBEB;  --red-text: #791F1F;
    --amber:    #854F0B; --amber-bg: #FAEEDA; --amber-text: #633806;
    --teal:     #0F6E56; --teal-bg: #E1F5EE;  --teal-text: #085041;
    --purple:   #534AB7; --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --radius:   10px; --radius-sm: 6px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a; --bg2: #242424; --bg3: #2e2e2e;
      --text: #f0f0f0; --text2: #aaa; --text3: #666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
    }
  }
  body { font-family: var(--font); background: var(--bg3); color: var(--text); font-size: 14px; }
  a { color: var(--blue); text-decoration: none; }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
  .sidebar { background: var(--bg); border-right: 0.5px solid var(--border); padding: 1.25rem; overflow-y: auto; }
  .main    { padding: 1.5rem; overflow-y: auto; }

  h1 { font-size: 15px; font-weight: 500; margin-bottom: 1.25rem; }
  h2 { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  h3 { font-size: 14px; font-weight: 500; margin-bottom: .5rem; }

  .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: .9rem 1rem; border: 0.5px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .stat-val   { font-size: 24px; font-weight: 500; }

  .search-box { width: 100%; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-size: 13px; margin-bottom: 12px; }

  .author-list { display: flex; flex-direction: column; gap: 4px; }
  .author-item { padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background .1s; }
  .author-item:hover    { background: var(--bg2); }
  .author-item.active   { background: var(--blue-bg); color: var(--blue-text); }
  .author-item .av      { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .author-item .av-nyt  { background: var(--blue-bg);   color: var(--blue-text); }
  .author-item .av-grd  { background: var(--teal-bg);   color: var(--teal-text); }
  .author-item .av-wpo  { background: var(--purple-bg); color: var(--purple-text); }
  .author-item .av-atl  { background: var(--amber-bg);  color: var(--amber-text); }
  .author-item .av-cnn  { background: #FEE2E2; color: #991B1B; }
  .author-item .av-fox  { background: #FEF3C7; color: #92400E; }
  .author-item .av-bbc  { background: #FCE7F3; color: #9D174D; }
  .author-item .av-npr  { background: #E0F2FE; color: #075985; }
  .author-item .av-alj  { background: #DCFCE7; color: #166534; }
  .author-item .av-htz  { background: #F0FDF4; color: #14532D; }
  .author-item .av-jpo  { background: #EFF6FF; color: #1E40AF; }
  .author-item .av-toi  { background: #FDF4FF; color: #6B21A8; }
  .author-item .av-reu  { background: #FFF7ED; color: #9A3412; }
  .author-item .av-eco  { background: #F1F5F9; color: #334155; }
  .author-item .av-wsj  { background: #FEF2F2; color: #7F1D1D; }
  .author-item .av-pol  { background: #F8FAFC; color: #1E293B; }
  .author-item .av-hil  { background: #ECFDF5; color: #065F46; }
  .author-item .av-ft   { background: #FFF8F1; color: #C2410C; }
  .author-item .name    { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .author-item .pct     { font-size: 11px; font-weight: 500; margin-left: auto; flex-shrink: 0; }
  .pct-good    { color: var(--green); }
  .pct-mid     { color: var(--amber); }
  .pct-bad     { color: var(--red); }
  .pct-none    { color: var(--text3); }

  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin: 14px 0 6px; padding-left: 10px; }

  .card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 1.1rem 1.25rem; margin-bottom: 1rem; }

  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .badge-correct     { background: var(--green-bg);  color: var(--green-text); }
  .badge-incorrect   { background: var(--red-bg);    color: var(--red-text);   }
  .badge-partial     { background: var(--amber-bg);  color: var(--amber-text); }
  .badge-unverifiable{ background: var(--bg3);        color: var(--text3);      }
  .badge-pending     { background: var(--blue-bg);   color: var(--blue-text);  }

  .bar-wrap { background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
  .bar-green  { background: #639922; }
  .bar-amber  { background: #BA7517; }
  .bar-red    { background: #E24B4A; }

  .pred-row { border-bottom: 0.5px solid var(--border); padding: 10px 0; }
  .pred-row:last-child { border-bottom: none; }
  .pred-claim   { font-size: 13px; line-height: 1.5; margin-bottom: 4px; }
  .pred-meta    { font-size: 11px; color: var(--text3); display: flex; gap: 10px; flex-wrap: wrap; }
  .pred-outcome { font-size: 12px; color: var(--text2); margin-top: 5px; border-left: 2px solid var(--border2); padding-left: 8px; line-height: 1.4; }

  .leaderboard { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .lb-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
  .lb-rank { font-size: 12px; color: var(--text3); width: 20px; flex-shrink: 0; }
  .lb-name { font-size: 13px; flex: 1; }
  .lb-pct  { font-size: 13px; font-weight: 500; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: 20px; background: transparent; color: var(--text); cursor: pointer; }
  .filter-btn.on { background: var(--blue-bg); color: var(--blue-text); border-color: transparent; }

  .tab-row { display: flex; gap: 0; border-bottom: 0.5px solid var(--border); margin-bottom: 1rem; }
  .tab { font-size: 13px; padding: 8px 16px; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text2); }
  .tab.active { border-bottom-color: var(--blue); color: var(--text); font-weight: 500; }

  .empty { text-align: center; color: var(--text3); padding: 2.5rem; font-size: 13px; }
  .loading { text-align: center; color: var(--text3); padding: 2rem; }

  .profile-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; }
  .profile-av { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; flex-shrink: 0; }
  .profile-name { font-size: 18px; font-weight: 500; }
  .profile-site { font-size: 13px; color: var(--text3); }
  .score-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .score-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-ring .score-num  { font-size: 18px; font-weight: 500; }
  .score-ring .score-sub  { font-size: 10px; color: var(--text3); }

  .breakdown { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 1rem 0; }
  .bk-item { background: var(--bg2); border-radius: var(--radius-sm); padding: .6rem .8rem; text-align: center; }
  .bk-num  { font-size: 20px; font-weight: 500; }
  .bk-lbl  { font-size: 11px; color: var(--text3); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .leaderboard { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h1>Op-Ed Tracker</h1>
    <input class="search-box" id="author-search" placeholder="Search authors…" oninput="filterSidebar()">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
      <input type="checkbox" id="hide-empty" checked onchange="filterSidebar()" style="cursor:pointer;">
      <label for="hide-empty" style="font-size:12px;color:var(--text3);cursor:pointer;">Hide unscored authors</label>
    </div>
    <div style="margin-bottom:8px;">
      <select id="filter-theme" onchange="filterSidebar()" style="width:100%;padding:6px 8px;font-size:12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);margin-bottom:6px;">
        <option value="">All topics</option>
        <option>US Politics</option>
        <option>Foreign Policy</option>
        <option>Economy</option>
        <option>Middle East</option>
        <option>Climate &amp; Environment</option>
        <option>Technology &amp; AI</option>
        <option>Media &amp; Culture</option>
        <option>Health &amp; Science</option>
        <option>Education &amp; Society</option>
      </select>
      <div style="display:flex;gap:6px;align-items:center;">
        <label style="font-size:11px;color:var(--text3);white-space:nowrap;">Min coverage</label>
        <input type="range" id="filter-coverage" min="0" max="80" step="10" value="0" oninput="document.getElementById('coverage-val').textContent=this.value+'%';filterSidebar()" style="flex:1;">
        <span id="coverage-val" style="font-size:11px;color:var(--text3);min-width:28px;">0%</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:4px;">
        <label style="font-size:11px;color:var(--text3);white-space:nowrap;">Min score</label>
        <input type="range" id="filter-score" min="0" max="90" step="10" value="0" oninput="document.getElementById('score-val').textContent=this.value+'%';filterSidebar()" style="flex:1;">
        <span id="score-val" style="font-size:11px;color:var(--text3);min-width:28px;">0%</span>
      </div>
    </div>
    <div class="author-list" id="author-list"><div class="loading">Loading…</div></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-panel">
    <div id="overview-view">
      <div class="stats-row" id="global-stats">
        <div class="stat"><div class="stat-label">Authors</div><div class="stat-val" id="gs-authors">—</div></div>
        <div class="stat"><div class="stat-label">Articles</div><div class="stat-val" id="gs-articles">—</div></div>
        <div class="stat"><div class="stat-label">Predictions</div><div class="stat-val" id="gs-preds">—</div></div>
        <div class="stat"><div class="stat-label">Checked</div><div class="stat-val" id="gs-checked">—</div></div>
      </div>

      <div id="authors-tab">
        <h2>Reliability leaderboard</h2>
        <div class="leaderboard" id="leaderboard"><div class="loading">Loading…</div></div>
        <h2 style="margin-top:1.5rem;">Recent checks</h2>
        <div class="card" id="recent-preds"><div class="loading">Loading…</div></div>
      </div>


    </div>

    <div id="author-view" style="display:none;"></div>
    <div id="outlet-view" style="display:none;"></div>
  </main>
</div>

<script>
const API = window.location.origin + "/api";

const SITE_MAP = {
  "New York Times":"nyt","The Guardian":"grd","Washington Post":"wpo","The Atlantic":"atl",
  "CNN":"cnn","Fox News":"fox","BBC News":"bbc","NPR":"npr",
  "Al Jazeera":"alj","Haaretz":"htz","Jerusalem Post":"jpo","Times of Israel":"toi",
  "Reuters":"reu","The Economist":"eco","Wall Street Journal":"wsj",
  "Politico":"pol","The Hill":"hil","Financial Times":"ft",
};
const SITE_COLORS = {
  nyt:"av-nyt", grd:"av-grd", wpo:"av-wpo", atl:"av-atl",
  cnn:"av-cnn", fox:"av-fox", bbc:"av-bbc", npr:"av-npr",
  alj:"av-alj", htz:"av-htz", jpo:"av-jpo", toi:"av-toi",
  reu:"av-reu", eco:"av-eco", wsj:"av-wsj", pol:"av-pol", hil:"av-hil", ft:"av-ft",
};
const SITE_LABELS = {
  "Paul Krugman":"New York Times","Maureen Dowd":"New York Times","David Brooks":"New York Times",
  "Gail Collins":"New York Times","Charles Blow":"New York Times","Ross Douthat":"New York Times",
  "Ezra Klein":"New York Times","Michelle Goldberg":"New York Times","Thomas Friedman":"New York Times",
  "Bret Stephens":"New York Times","Nicholas Kristof":"New York Times","Frank Bruni":"New York Times",
  "George Monbiot":"The Guardian","Polly Toynbee":"The Guardian","Owen Jones":"The Guardian",
  "Simon Jenkins":"The Guardian","Gary Younge":"The Guardian","Marina Hyde":"The Guardian",
  "Jonathan Freedland":"The Guardian","Zoe Williams":"The Guardian","Hadley Freeman":"The Guardian",
  "Nesrine Malik":"The Guardian",
  "Eugene Robinson":"Washington Post","George Will":"Washington Post","Jennifer Rubin":"Washington Post",
  "Dana Milbank":"Washington Post","Kathleen Parker":"Washington Post","E.J. Dionne":"Washington Post",
  "Max Boot":"Washington Post","David Ignatius":"Washington Post","Megan McArdle":"Washington Post",
  "Robert Kagan":"Washington Post","Fareed Zakaria":"Washington Post",
  "David Frum":"The Atlantic","Anne Applebaum":"The Atlantic","Adam Serwer":"The Atlantic",
  "Conor Friedersdorf":"The Atlantic","Tom Nichols":"The Atlantic","Caitlin Flanagan":"The Atlantic",
  "Van Jones":"CNN","S.E. Cupp":"CNN","Jill Filipovic":"CNN","Dean Obeidallah":"CNN",
  "Roxanne Jones":"CNN","Bob Greene":"CNN",
  "Tucker Carlson":"Fox News","Laura Ingraham":"Fox News","Victor Davis Hanson":"Fox News",
  "Newt Gingrich":"Fox News","Karl Rove":"Fox News","Ari Fleischer":"Fox News",
  "Jonathan Turley":"Fox News","Mollie Hemingway":"Fox News","Miranda Devine":"Fox News",
  "Katty Kay":"BBC News","Ros Atkins":"BBC News","John Simpson":"BBC News",
  "Mark Mardell":"BBC News","Lyse Doucet":"BBC News","Jeremy Bowen":"BBC News",
  "Mara Liasson":"NPR","David Folkenflik":"NPR","Domenico Montanaro":"NPR",
  "Mary Louise Kelly":"NPR","Ari Shapiro":"NPR",
  "Marwan Bishara":"Al Jazeera","Ali Younes":"Al Jazeera","Daoud Kuttab":"Al Jazeera",
  "Ramzy Baroud":"Al Jazeera","Joseph Massad":"Al Jazeera","Khaled Diab":"Al Jazeera",
  "Gideon Levy":"Haaretz","Amira Hass":"Haaretz","Benny Morris":"Haaretz",
  "Chemi Shalev":"Haaretz","Amos Harel":"Haaretz","Yossi Verter":"Haaretz",
  "Anshel Pfeffer":"Haaretz","Bradley Burston":"Haaretz",
  "Caroline Glick":"Jerusalem Post","Herb Keinon":"Jerusalem Post","Gil Troy":"Jerusalem Post",
  "Douglas Bloomfield":"Jerusalem Post","Ruthie Blum":"Jerusalem Post","Seth Frantzman":"Jerusalem Post",
  "David Horovitz":"Times of Israel","Haviv Rettig Gur":"Times of Israel",
  "Raphael Ahren":"Times of Israel","Mitch Ginsburg":"Times of Israel","Jacob Magid":"Times of Israel",
  "John Lloyd":"Reuters","Hugo Dixon":"Reuters",
  "Bagehot":"The Economist","Lexington":"The Economist","Charlemagne":"The Economist",
  "Peggy Noonan":"Wall Street Journal","William Galston":"Wall Street Journal",
  "Kimberley Strassel":"Wall Street Journal","Daniel Henninger":"Wall Street Journal",
  "Jason Riley":"Wall Street Journal","Mary Anastasia O'Grady":"Wall Street Journal",
  "Roger Simon":"Politico","Jack Shafer":"Politico","Bill Scher":"Politico",
  "Juan Williams":"The Hill","Liz Peek":"The Hill","Douglas MacKinnon":"The Hill","Joe Concha":"The Hill",
  "Martin Wolf":"Financial Times","Gideon Rachman":"Financial Times","Janan Ganesh":"Financial Times",
  "Edward Luce":"Financial Times","Gillian Tett":"Financial Times","Philip Stephens":"Financial Times",
};

let allAuthors = [];
let activeAuthor = null;

function initials(name) {
  return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
}
function siteKey(author) {
  const s = SITE_LABELS[author] || "";
  return SITE_MAP[s] || "nyt";
}
function pctColor(pct) {
  if (pct == null || pct === 0) return "pct-none";
  if (pct >= 65) return "pct-good";
  if (pct >= 40) return "pct-mid";
  return "pct-bad";
}
function barClass(pct) {
  if (pct >= 65) return "bar-green";
  if (pct >= 40) return "bar-amber";
  return "bar-red";
}

async function api(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch(e) {
    return null;
  }
}

async function loadOverview() {
  const [stats, lb, recent] = await Promise.all([
    api("/stats"), api("/leaderboard"), api("/predictions/recent?limit=15")
  ]);

  if (stats) {
    document.getElementById("gs-authors").textContent  = stats.total_authors;
    document.getElementById("gs-articles").textContent = stats.total_articles.toLocaleString();
    document.getElementById("gs-preds").textContent    = stats.total_predictions.toLocaleString();
    document.getElementById("gs-checked").textContent  = stats.total_checked.toLocaleString();
  }

  if (lb) {
    const lbEl = document.getElementById("leaderboard");
    const renderSide = (list, label) => {
      const filtered = list.filter(r => (r.checked_count||0) >= 5);
      if (!filtered.length) return `<p class="empty">No data yet</p>`;
      return `<div>
        <div class="section-label">${label}</div>
        ${filtered.map((r,i) => `
          <div class="lb-item">
            <span class="lb-rank">${i+1}</span>
            <span class="lb-name">${r.author}</span>
            <span class="lb-pct ${pctColor(r.combined_score||r.reliability_pct)}">${
              r.combined_score > 0 ? r.combined_score.toFixed(1)+"%" : r.reliability_pct != null ? r.reliability_pct.toFixed(1)+"%" : "—"
            }</span>
          </div>`).join("")}
      </div>`;
    };
    // Also load fact ratings into leaderboard
    api("/fact_ratings").then(facts => {
      if (!facts || !facts.length) return;
      window._factRatings = {};
      facts.forEach(f => window._factRatings[f.author] = f);
    });
    lbEl.innerHTML = renderSide(lb.top||[], "Most accurate") + renderSide(lb.bottom||[], "Least accurate");
  }

  if (recent && recent.length) {
    const recEl = document.getElementById("recent-preds");
    recEl.innerHTML = recent.map(p => `
      <div class="pred-row">
        <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:4px;">
          <span class="badge badge-${p.verdict||'pending'}">${p.verdict||'pending'}</span>
          <span style="font-size:12px;color:var(--text3);">${p.author}</span>
        </div>
        <div class="pred-claim">${p.claim}</div>
        ${p.outcome_text ? `<div class="pred-outcome">${p.outcome_text}</div>` : ""}
      </div>`).join("");
  } else if (recent) {
    document.getElementById("recent-preds").innerHTML = `<p class="empty">No predictions checked yet. Run the pipeline first.</p>`;
  }
}

async function loadSidebar() {
  const [data, outletData, themeData] = await Promise.all([
    api("/authors"),
    api("/outlet_ratings"),
    api("/author_themes")
  ]);
  if (!data) {
    allAuthors = Object.keys(SITE_LABELS).map(name => ({ author: name, reliability_pct: null }));
  } else {
    allAuthors = data;
  }
  window._outletRatings = {};
  if (outletData) outletData.forEach(o => window._outletRatings[o.outlet] = o);
  window._authorThemes = themeData || {};
  renderSidebar(allAuthors);
}

function renderSidebar(list) {
  const grouped = {};
  list.forEach(a => {
    const s = SITE_LABELS[a.author] || "Other";
    (grouped[s] = grouped[s]||[]).push(a);
  });

  const el = document.getElementById("author-list");
  el.innerHTML = "";
  Object.entries(grouped).forEach(([site, authors]) => {
    const or = (window._outletRatings||{})[site];
    const pct = or && or.avg_reliability > 0 ? or.avg_reliability.toFixed(0)+"%" : "";
    const pctCls = pct ? pctColor(or.avg_reliability) : "";
    const header = document.createElement("div");
    header.className = "section-label";
    header.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding-right:10px;";
    header.innerHTML = "<span style='cursor:pointer;text-decoration:underline dotted;' onclick=\"showOutlet('" + site.replace(/'/g, "\\'") + "')\">'" + site + "</span>" + (pct ? "<span class='" + pctCls + "' style='font-size:10px;font-weight:500;'>" + pct + "</span>" : "");
    el.appendChild(header);
    authors.forEach(a => {
      const score = a.combined_score > 0 ? a.combined_score : a.reliability_pct;
      const hasEnoughData = (a.checked_count || 0) >= 5;
      const scoreStr = hasEnoughData && score > 0 ? score.toFixed(0)+"%" : "—";
      const name = a.author.replace(/"/g, "&quot;");
      const div = document.createElement("div");
      div.className = "author-item" + (activeAuthor===a.author ? " active" : "");
      div.dataset.author = a.author;
      div.innerHTML = "<div class='av " + SITE_COLORS[siteKey(a.author)] + "'>" + initials(a.author) + "</div>" +
        "<span class='name'>" + a.author + "</span>" +
        "<span class='pct " + pctColor(score) + "'>" + scoreStr + "</span>";
      div.addEventListener("click", () => showAuthor(a.author));
      el.appendChild(div);
    });
  });
}
function filterSidebar() {
  const q         = document.getElementById("author-search").value.toLowerCase();
  const theme     = document.getElementById("filter-theme").value;
  const minCov    = parseInt(document.getElementById("filter-coverage").value) || 0;
  const minScore  = parseInt(document.getElementById("filter-score").value) || 0;

  const hideEmpty = document.getElementById("hide-empty").checked;
  let list = allAuthors;

  // Hide authors with no score and no predictions
  if (hideEmpty) {
    list = list.filter(a => (a.checked_count || 0) >= 5);
  }

  if (q) list = list.filter(a => a.author.toLowerCase().includes(q));

  if (theme || minCov > 0 || minScore > 0) {
    list = list.filter(a => {
      const breakdown = window._authorThemes && window._authorThemes[a.author];
      if (!breakdown) return !theme && minCov === 0;

      if (theme) {
        const match = breakdown.find(t => t.theme === theme);
        if (!match) return false;
        if (match.pct < minCov) return false;
      } else if (minCov > 0) {
        // Must have at least one theme meeting coverage threshold
        if (!breakdown.some(t => t.pct >= minCov)) return false;
      }

      // Score filter — use combined_score
      const score = a.combined_score || a.reliability_pct || 0;
      if (score < minScore) return false;

      return true;
    });
  }

  renderSidebar(list);
}

async function showAuthor(author) {
  activeAuthor = author;
  filterSidebar();

  document.getElementById("overview-view").style.display = "none";
  const view = document.getElementById("author-view");
  view.style.display = "block";
  view.innerHTML = `<div class="loading">Loading ${author}…</div>`;

  const data = await api("/author/" + encodeURIComponent(author));
  if (!data) {
    view.innerHTML = `<div class="empty">Could not load data. Is the server running?<br><code>python server.py</code></div>`;
    return;
  }

  const r     = data.rating || {};
  const preds = data.predictions || [];
  const site  = SITE_LABELS[author] || "";
  const sk    = siteKey(author);
  const pct   = r.reliability_pct;

  const verdicts   = ["correct","partial","incorrect","unverifiable","pending"];
  const filterBtns = verdicts.map(v => `<button class="filter-btn" id="fb-${v}" onclick="filterPreds('${v}')">${v}</button>`).join("");

  const pctLabel = pct != null ? pct.toFixed(1)+"%" : "N/A";
  const circum   = 2 * Math.PI * 28;
  const dash     = pct != null ? (circum * (1 - pct/100)).toFixed(1) : circum;

  view.innerHTML = `
    <button onclick="backToOverview()" style="font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;margin-bottom:1rem;">← All authors</button>

    <div class="card profile-header" style="align-items:flex-start;">
      <div class="av ${SITE_COLORS[sk]}" style="width:48px;height:48px;font-size:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;">${initials(author)}</div>
      <div style="flex:1;">
        <div class="profile-name">${author}</div>
        <div class="profile-site">${site}</div>
        <div id="author-themes-${author.replace(/\s/g,'_')}" style="margin:4px 0;"></div>
        <div style="display:flex;align-items:center;gap:8px;margin:6px 0;">
          <span style="font-size:22px;font-weight:500;" class="${pctColor(r.combined_score||r.reliability_pct)}">${
            r.combined_score > 0 ? r.combined_score.toFixed(1)+"%" : r.reliability_pct > 0 ? r.reliability_pct.toFixed(1)+"%" : "N/A"
          }</span>
          <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);">
            ${r.confidence_level || "low"} confidence
          </span>
          ${(r.total_checked||0) < 5 ? `<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#FEF3C7;color:#92400E;">score not shown publicly</span>` : ""}
        </div>
        <div class="breakdown">
          <div class="bk-item"><div class="bk-num" style="color:var(--green)">${r.correct||0}</div><div class="bk-lbl">Correct</div></div>
          <div class="bk-item"><div class="bk-num" style="color:var(--amber)">${r.partial||0}</div><div class="bk-lbl">Partial</div></div>
          <div class="bk-item"><div class="bk-num" style="color:var(--red)">${r.incorrect||0}</div><div class="bk-lbl">Incorrect</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
          <div class="bar-wrap" style="flex:1;"><div class="bar-fill ${barClass(pct||0)}" style="width:${pct||0}%"></div></div>
          <span style="font-size:15px;font-weight:500;min-width:50px;" class="${pctColor(pct)}">${pctLabel}</span>
        </div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">${r.total_checked||0} predictions checked · avg score ${r.avg_score!=null?r.avg_score.toFixed(1):"—"}/10</div>
        
      </div>
    </div>

    <div style="margin-bottom:.75rem;">
      <div class="filter-row">
        <button class="filter-btn on" id="fb-all" onclick="filterPreds('all')">All (${preds.length})</button>
        ${filterBtns}
      </div>
      <div class="filter-row" id="theme-filter-row" style="margin-top:4px;">
        <span style="font-size:11px;color:var(--text3);padding-top:5px;">Topic:</span>
        <button class="filter-btn on" id="ft-all" onclick="filterByTheme('')">All</button>
        ${(data.theme_breakdown||[]).map(t =>
          `<button class="filter-btn" id="ft-${t.theme.replace(/[^a-z]/gi,'_')}" onclick="filterByTheme('${t.theme}')">${t.theme} ${t.pct}%</button>`
        ).join("")}
      </div>
    </div>

    <div id="preds-list"></div>
  `;

  window._preds = preds;
  filterPreds("all");

  // Show theme breakdown - % of writing per theme, top 4 only, one theme per article
  const themeEl = document.getElementById("author-themes-" + author.replace(/\s/g,"_"));
  const themes = data.theme_breakdown || [];
  window._authorThemeKeywords = {};
  try {
    const tkData = await api("/theme_keywords");
    if (tkData) window._authorThemeKeywords = tkData;
  } catch(e) {}

  if (themeEl && themes.length) {
    themeEl.innerHTML = themes.map(t => {
      const bg  = t.reliable ? "var(--bg3)" : "#FEF3C7";
      const col = t.reliable ? "var(--text2)" : "#92400E";
      const tip = !t.reliable ? " title='Low data — only " + t.count + " article" + (t.count!==1?"s":"") + "'" : "";
      return "<span style='display:inline-block;padding:2px 8px;margin:2px;border-radius:12px;font-size:11px;background:" + bg + ";color:" + col + ";cursor:pointer;'" + tip + " onclick='filterPredsByTheme(\"" + t.theme + "\")'" + ">" +
        t.theme + " <span style='opacity:0.65;'>" + t.pct + "%</span>" +
        (!t.reliable ? " ⚠" : "") +
        "</span>";
    }).join("") +
    "<span style='display:inline-block;padding:2px 8px;margin:2px;border-radius:12px;font-size:11px;background:var(--bg3);color:var(--text3);cursor:pointer;' onclick='filterPreds(\"all\")''>All topics</span>";
  }
}




function filterPredsByTheme(theme) {
  // Get keywords for this theme
  const keywords = (window._authorThemeKeywords && window._authorThemeKeywords[theme]) || [theme.toLowerCase()];
  const list = window._preds.filter(p => {
    const text = ((p.claim || "") + " " + (p.article_title || "") + " " + (p.outcome_text || "")).toLowerCase();
    return keywords.some(kw => text.includes(kw.toLowerCase()));
  });
  const el = document.getElementById("preds-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty">No predictions found for "${theme}".<br><small>Try clicking "All topics" to see everything.</small></div>`;
    return;
  }
  renderPredList(list, el);
}

let _activeTheme = "";

function filterByTheme(theme) {
  _activeTheme = theme;
  document.querySelectorAll("#theme-filter-row .filter-btn").forEach(b => b.classList.remove("on"));
  const btn = theme ? document.getElementById("ft-" + theme.replace(/[^a-z]/gi,"_")) : document.getElementById("ft-all");
  if (btn) btn.classList.add("on");
  filterPreds(document.querySelector(".filter-btn.on:not(#theme-filter-row .filter-btn)")?.id?.replace("fb-","") || "all");
}

function filterPreds(verdict) {
  document.querySelectorAll(".filter-row:first-child .filter-btn").forEach(b => b.classList.remove("on"));
  const btn = document.getElementById("fb-" + verdict);
  if (btn) btn.classList.add("on");

  let list = verdict === "all"
    ? window._preds
    : window._preds.filter(p => (p.verdict||"pending") === verdict);

  // Also filter by theme if one is selected
  if (_activeTheme && window._authorThemes) {
    const author = window._preds[0]?.author || "";
    // Find articles matching this theme by checking claim text
    const themeKeywords = {
      "US Politics": ["trump","biden","democrat","republican","congress","election","senate","maga"],
      "Foreign Policy": ["iran","ukraine","china","russia","nato","war","europe","international"],
      "Economy": ["trade","tariff","inflation","gdp","jobs","recession","market","economy"],
      "Middle East": ["israel","gaza","palestin","jerusalem","hamas","arab","netanyahu"],
      "Climate & Environment": ["climate","energy","oil","emission","environment","carbon","green"],
      "Technology & AI": ["tech","ai","silicon","algorithm","data","digital","platform"],
      "Media & Culture": ["journalism","media","culture","book","film","press","entertainment"],
      "Health & Science": ["health","covid","vaccine","medical","pandemic","science","research"],
      "Education & Society": ["education","school","college","student","university","campus"],
    };
    const kws = themeKeywords[_activeTheme] || [];
    if (kws.length) {
      list = list.filter(p => kws.some(kw => (p.claim||"").toLowerCase().includes(kw)));
    }
  }

  const el = document.getElementById("preds-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty">No ${verdict === "all" ? "" : verdict+" "}predictions found.</div>`;
    return;
  }
  renderPredList(list, el);
}

function renderPredList(list, el) {
  el.innerHTML = list.map(p => `
    <div class="pred-row card" style="margin-bottom:8px;">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
        <span class="badge badge-${p.verdict||'pending'}">${p.verdict||'pending'}</span>
        ${p.score != null && p.score >= 0 ? `<span style="font-size:11px;color:var(--text3);">score ${p.score.toFixed(1)}/10</span>` : ""}
        <span style="font-size:11px;color:var(--text3);margin-left:auto;">${p.published||""}</span>
      </div>
      <div class="pred-claim">${p.claim}</div>
      ${p.context ? `<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic;">"${p.context.slice(0,120)}…"</div>` : ""}
      ${p.outcome_text ? `<div class="pred-outcome">${p.outcome_text}</div>` : ""}
      <div style="font-size:11px;color:var(--text3);margin-top:6px;">
        ${p.article_title ? `<a href="${p.article_url||'#'}" target="_blank">${p.article_title.slice(0,60)}</a>` : ""}
        ${p.predicted_year && p.predicted_year !== "unspecified" ? ` · predicted for ${p.predicted_year}` : ""}
      </div>
    </div>`).join("");
}

function backToOverview() {
  activeAuthor = null;
  document.getElementById("overview-view").style.display = "block";
  document.getElementById("author-view").style.display = "none";
  document.getElementById("outlet-view").style.display = "none";
  filterSidebar();
}

async function showOutlet(outlet) {
  document.getElementById("overview-view").style.display = "none";
  document.getElementById("author-view").style.display = "none";
  const view = document.getElementById("outlet-view");
  view.style.display = "block";
  view.innerHTML = "<div class=\"loading\">Loading " + outlet + "...</div>";

  const data = await api("/outlet_detail/" + encodeURIComponent(outlet));
  if (!data) { view.innerHTML = "<div class=\"empty\">Could not load.</div>"; return; }

  const r = data.rating || {};
  const pct = r.avg_reliability > 0 ? r.avg_reliability.toFixed(1)+"%" : "N/A";
  const topicHTML = (data.top_topics || []).map(t =>
    "<span style=\"display:inline-block;padding:2px 8px;margin:2px;border-radius:12px;font-size:11px;background:var(--bg3);color:var(--text2);\">" + t.topic + "</span>"
  ).join("");

  const themeHTML = (data.theme_scores || []).map(t => {
    const pct = t.avg_score || 0;
    const bar = Math.round(pct);
    const cls = pct >= 65 ? "bar-green" : pct >= 40 ? "bar-amber" : "bar-red";
    return "<div style=\"margin-bottom:10px;\">" +
      "<div style=\"display:flex;justify-content:space-between;margin-bottom:3px;\">" +
        "<span style=\"font-size:13px;\">" + t.theme + "</span>" +
        "<span style=\"font-size:12px;font-weight:500;\" class=\"" + pctColor(pct) + "\">" + pct.toFixed(1) + "%</span>" +
      "</div>" +
      "<div class=\"bar-wrap\"><div class=\"bar-fill " + cls + "\" style=\"width:" + bar + "%\"></div></div>" +
      "<div style=\"font-size:11px;color:var(--text3);margin-top:2px;\">" + t.author_count + " author" + (t.author_count!==1?"s":"") + "</div>" +
    "</div>";
  }).join("");

  const authHTML = (data.authors || [])
    .filter(a => a.total_checked > 0)
    .sort((a,b) => (b.combined_score||0)-(a.combined_score||0))
    .map(a => {
      const s = (a.combined_score||0) > 0 ? a.combined_score.toFixed(1)+"%" : (a.reliability_pct||0) > 0 ? a.reliability_pct.toFixed(1)+"%" : "—";
      return "<div class=\"lb-item\" style=\"cursor:pointer;\" onclick=\"showAuthor('" + a.author.replace(/'/g,"\\'") + "')\">"+
        "<div class=\"av " + SITE_COLORS[siteKey(a.author)] + "\" style=\"width:28px;height:28px;font-size:11px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0;\">" + initials(a.author) + "</div>"+
        "<span class=\"lb-name\">" + a.author + "</span>"+
        "<span class=\"lb-pct " + pctColor(a.combined_score||a.reliability_pct) + "\">" + s + "</span></div>";
    }).join("") || "<p class=\"empty\">No scored authors yet.</p>";

  view.innerHTML =
    "<button onclick=\"backToOverview()\" style=\"font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;margin-bottom:1rem;\">&larr; All authors</button>"+
    "<div class=\"card\" style=\"margin-bottom:1rem;\">" +
      "<div style=\"display:flex;align-items:center;gap:12px;margin-bottom:10px;\">" +
        "<div style=\"flex:1;\">" +
          "<div style=\"font-size:18px;font-weight:500;\">" + outlet + "</div>" +
          "<div style=\"font-size:13px;color:var(--text3);\">" + (r.author_count||0) + " authors rated</div>" +
        "</div>" +
        "<span style=\"font-size:22px;font-weight:500;\" class=\"" + pctColor(r.avg_reliability) + "\">" + pct + "</span>" +
      "</div>" +
      (topicHTML ? "<div style=\"margin-bottom:8px;\"><div style=\"font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;\">Topics</div>" + topicHTML + "</div>" : "") +
      (themeHTML ? "<div style=\"margin-top:8px;\"><div style=\"font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;\">Reliability by theme</div>" + themeHTML + "</div>" : "") +
    "</div>" +
    "<h3 style=\"margin-bottom:.75rem;\">Authors</h3>" + authHTML;
}

loadSidebar();
loadOverview();
</script>
